<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/SocialApp/SocialApp/landing/templates/login-page/styles.css">
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

</head>
<body background="90452.jpg">
  <div class="container h-100">
    <div class="d-flex justify-content-center h-100">
      <div class="user_card">
        <div class="d-flex justify-content-center">
          <div class="brand_logo_container">
            <img src="https://cdn.pixabay.com/photo/2015/04/23/22/00/tree-736885__340.jpg" class="brand_logo" alt="Logo">
          </div>
        </div>
        <div class="d-flex justify-content-center form_container">
          <form>
            <div class="input-group mb-3">
              <div class="input-group-append">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
              </div>
              <input type="text" name="" class="form-control input_user" value="" placeholder="Username">
            </div>
            <div class="input-group mb-2">
              <div class="input-group-append">
                <span class="input-group-text"><i class="fas fa-key"></i></span>
              </div>
              <input type="password" name="" class="form-control input_pass" value="" placeholder="Password">
            </div>
            <div class="form-group">
              <div class="custom-control custom-checkbox">
                <input type="checkbox" class="custom-control-input" id="customControlInline">
                <label class="custom-control-label" for="customControlInline">Remember me</label>
              </div>
            </div>
              <div class="d-flex justify-content-center mt-3 login_container">
                <button type="button" name="button" class="btn login_btn">Login</button>
              </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  
  
</body>



<style>
  body {
    background-size: cover;
  }
  
  .container.h-100 {
    height: 100vh;
  }
  
  .d-flex.justify-content-center.h-100 {
    align-items: center;
  }
  
  .user_card {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 400px;
    width: 350px;
    background: rgba(0, 0, 0, 0.5);
    margin-top: auto;
    margin-bottom: auto;
    border-radius: 10px;
    padding: 30px;
    color: white;
  }
  
  .brand_logo_container {
    margin: 10px;
    text-align: center;
  }
  
  .brand_logo {
    width: 100px;
  }
  
  .form_container {
    margin-top: 100px;
  }
  
  .input-group.mb-3 {
    margin-bottom: 25px;
  }
  
  .input-group-append {
    margin-left: -1px;
    background: #e9ecef;
    border: 1px solid #ced4da;
    border-radius: 0 4px 4px 0;
  }
  
  .input_user,
  .input_pass {
    border: none;
    border-bottom: 1px solid #ced4da;
    background: transparent;
  }
  
  .custom-checkbox {
    margin-top: 20px;
  }
  
  .login_container {
    margin-top: 20px;
  }
  
  .btn.login_btn {
    background: #2980b9;
    color: white;
    border-radius: 10px;
    padding: 10px;
  }
  
  .btn.login_btn:hover {
    background: #2e86c1;
    cursor: pointer;
  }
</style>

</html>
